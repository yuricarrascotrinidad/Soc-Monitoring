{% extends "base.html" %}

{% block title %}SOC - Welcome{% endblock %}

{% block styles %}
<style>
    .welcome-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        text-align: center;
    }

    .welcome-card {
        background: var(--card-bg);
        padding: 50px;
        border-radius: 20px;
        box-shadow: 0 10px 25px var(--shadow-color);
        border: 1px solid var(--border-color);
        max-width: 600px;
    }

    .welcome-logo {
        font-size: 3em;
        font-weight: 800;
        margin-bottom: 20px;
    }

    .welcome-text {
        font-size: 1.2em;
        color: var(--text-light);
        margin-bottom: 40px;
        line-height: 1.6;
    }

    .action-btn {
        background: var(--primary-color);
        color: white;
        padding: 15px 40px;
        border-radius: 12px;
        font-size: 1.1em;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s;
        display: inline-block;
        border: none;
        cursor: pointer;
    }

    .action-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        opacity: 0.9;
    }
</style>
{% endblock %}

{% block content %}
<div class="welcome-container">
    <div class="welcome-card">
        <div class="welcome-logo">
            <span class="yof">YOFC</span><span class="soc">SOC</span>
        </div>
        <div class="welcome-text">
            Bienvenido al Centro de Control de Operaciones de YOFC.<br>
            Este portal proporciona monitoreo en tiempo real de alarmas, cámaras y estado del sistema.
        </div>
        
        <script>
            function enterDashboard() {
                const token = localStorage.getItem('jwt_token');
                if (token) {
                    window.location.href = '/dashboard';
                } else {
                    window.location.href = '/login';
                }
            }
        </script>
        
        <button onclick="enterDashboard()" class="action-btn">
            Acceder al Dashboard <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
        </button>
    </div>
</div>
{% endblock %}
