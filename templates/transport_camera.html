{% extends "base.html" %}

{% block title %}Monitoreo Cámaras Transport - SOC{% endblock %}

{% block styles %}
<style>
    /* Estructura de Pantalla Dividida - Consistente con Access */
    .camera-layout {
        display: flex;
        height: calc(100vh - 60px);
        background: var(--body-bg);
        margin: -20px;
        overflow: hidden;
    }

    /* Sidebar - Árbol Jerárquico */
    .camera-sidebar {
        width: 320px;
        background: var(--card-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
    }

    .sidebar-header {
        padding: 15px 20px;
        border-bottom: 1px solid var(--border-color);
        margin-top: 12px;
    }

    .sidebar-search input {
        width: 100%;
        padding: 10px 15px 10px 35px;
        background: var(--body-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-color);
        font-size: 0.9em;
        outline: none;
        box-sizing: border-box;
    }

    .tree-container {
        flex: 1;
        overflow-y: auto;
        padding: 10px 0;
    }

    /* Estilos del Árbol Jerárquico */
    .site-group {
        margin-bottom: 2px;
    }

    .site-header {
        padding: 10px 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-light);
        font-size: 0.9em;
        font-weight: 500;
        transition: background 0.2s;
    }

    .site-header:hover {
        background: var(--border-color);
    }

    .site-header i.toggle-icon {
        width: 12px;
        font-size: 0.8em;
        transition: transform 0.2s;
    }

    .site-group.expanded i.toggle-icon {
        transform: rotate(90deg);
    }

    .positions-list {
        display: none;
        background: var(--body-bg);
    }

    .site-group.expanded .positions-list {
        display: block;
    }

    .position-node {
        padding: 8px 15px 8px 40px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-muted);
        font-size: 0.85em;
        transition: all 0.2s;
        border-left: 3px solid transparent;
    }

    .position-node:hover {
        background: var(--border-color);
        color: var(--text-color);
    }

    .position-node.active {
        background: #1e40af;
        color: white;
        border-left-color: #3b82f6;
    }

    /* Área Principal */
    .camera-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--body-bg);
    }

    .main-header {
        padding: 12px 20px;
        background: var(--header-bg);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .site-info h2 {
        margin: 0;
        color: var(--text-color);
        font-size: 1.15em;
    }

    .site-info p {
        margin: 4px 0 0;
        color: var(--text-muted);
        font-size: 0.85em;
    }

    .player-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
    }

    .video-wrapper {
        width: 100%;
        height: 100%;
        background: #000;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
    }

    #camera-stream {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    .loading-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
    }

    .placeholder-msg {
        color: #475569;
        text-align: center;
    }

    .placeholder-msg i {
        font-size: 4em;
        margin-bottom: 15px;
        display: block;
    }

    .position-badge {
        background: #3b82f6;
        color: white;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.8em;
        text-transform: uppercase;
        font-weight: bold;
    }
</style>
{% endblock %}

{% block content %}
<div class="camera-layout">
    <aside class="camera-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-search" style="position: relative;">
                <i class="fas fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                <input type="text" id="site-search" placeholder="Buscar sitio...">
            </div>
        </div>
        <div class="tree-container" id="camera-tree">
            <div class="placeholder-msg" style="margin-top: 50px;">
                <p>Cargando sitios...</p>
            </div>
        </div>
    </aside>

    <main class="camera-main">
        <div class="main-header" id="video-header" style="visibility: hidden;">
            <div class="site-info">
                <h2><span id="active-site-name">---</span> <span id="active-pos-badge" class="position-badge">---</span></h2>
                <p id="active-site-ip">IP: ---</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary btn-sm" onclick="reloadStream()">
                    <i class="fas fa-sync-alt"></i> Recargar
                </button>
            </div>
        </div>

        <div class="player-container">
            <div class="video-wrapper">
                <div class="loading-overlay" id="stream-loader">
                    <div class="spinner"></div> <!-- Spinner CSS is inherited or should be defined -->
                    <style>.spinner { width: 50px; height: 50px; border: 4px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } }</style>
                </div>
                
                <img id="camera-stream" src="" style="display: none;">
                
                <div class="placeholder-msg" id="stream-placeholder">
                    <i class="fas fa-truck-moving"></i>
                    <p>Seleccione un sitio y posición para ver la cámara</p>
                </div>
            </div>
        </div>
    </main>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentChannel = null;
    let transportData = {};

    document.addEventListener('DOMContentLoaded', () => {
        loadCameras();
        document.getElementById('site-search').addEventListener('input', (e) => filterTree(e.target.value));
    });

    async function loadCameras() {
        try {
            const response = await fetch('/cameras');
            const data = await response.json();
            const cameras = data.transport || [];
            
            // Agrupar por sitio
            transportData = {};
            cameras.forEach(cam => {
                if (!transportData[cam.site]) transportData[cam.site] = [];
                transportData[cam.site].push(cam);
            });
            
            renderTree(transportData);
        } catch (error) {
            console.error('Error loading cameras:', error);
        }
    }

    function renderTree(data) {
        const container = document.getElementById('camera-tree');
        container.innerHTML = '';

        const sortedSites = Object.keys(data).sort();

        sortedSites.forEach(siteName => {
            const cams = data[siteName];
            const group = document.createElement('div');
            group.className = 'site-group';
            group.innerHTML = `
                <div class="site-header" onclick="toggleGroup(this.parentElement)">
                    <i class="fas fa-chevron-right toggle-icon"></i>
                    <i class="fas fa-folder"></i>
                    <span>${siteName}</span>
                </div>
                <div class="positions-list">
                    ${cams.map(cam => `
                        <div class="position-node" 
                             data-site="${siteName}" 
                             data-pos="${cam.position}" 
                             data-ip="${cam.ip}"
                             onclick="selectCamera(this)">
                            <i class="fas fa-video"></i>
                            <span>${cam.position.charAt(0).toUpperCase() + cam.position.slice(1)}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(group);
        });
    }

    function toggleGroup(element) {
        element.classList.toggle('expanded');
    }

    function filterTree(query) {
        const q = query.toLowerCase();
        const groups = document.querySelectorAll('.site-group');
        groups.forEach(group => {
            const siteName = group.querySelector('.site-header span').textContent.toLowerCase();
            if (siteName.includes(q)) {
                group.style.display = 'block';
            } else {
                group.style.display = 'none';
            }
        });
    }

    function selectCamera(element) {
        const site = element.dataset.site;
        const pos = element.dataset.pos;
        const ip = element.dataset.ip;

        // UI Updates
        document.querySelectorAll('.position-node').forEach(n => n.classList.remove('active'));
        element.classList.add('active');
        
        document.getElementById('video-header').style.visibility = 'visible';
        document.getElementById('active-site-name').textContent = site;
        document.getElementById('active-pos-badge').textContent = pos;
        document.getElementById('active-site-ip').textContent = `IP: ${ip}`;
        
        // Stream Logic
        const streamImg = document.getElementById('camera-stream');
        const placeholder = document.getElementById('stream-placeholder');
        const loader = document.getElementById('stream-loader');
        
        placeholder.style.display = 'none';
        streamImg.style.display = 'none';
        loader.style.display = 'flex';
        
        currentChannel = { site, pos };
        
        streamImg.onload = () => {
            loader.style.display = 'none';
            streamImg.style.display = 'block';
        };
        
        streamImg.onerror = () => {
            loader.style.display = 'none';
            placeholder.style.display = 'block';
            placeholder.innerHTML = `<i class="fas fa-unlink"></i><p>Error de conexión: ${site} (${pos})</p>`;
        };
        
        streamImg.src = `/video_feed/transport/${site}/${pos}`;
    }

    function reloadStream() {
        if (currentChannel) {
            const activeNode = document.querySelector(`.position-node.active`);
            if (activeNode) selectCamera(activeNode);
        }
    }
</script>
{% endblock %}
